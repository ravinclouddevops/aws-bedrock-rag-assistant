name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write       # required for OIDC token
  contents: read
  pull-requests: write  # required to post plan comment

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY: "bedrock-rag-assistant/dev/terraform.tfstate"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_environment: dev

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... output truncated (> 60k chars)'
              : planOutput;

            const fmtStatus  = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const initStatus = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const valStatus  = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = [
              '## Terraform Plan',
              '',
              `| Step | Status |`,
              `|------|--------|`,
              `| Format | ${fmtStatus} |`,
              `| Init | ${initStatus} |`,
              `| Validate | ${valStatus} |`,
              `| Plan | ${planStatus} |`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if format check failed
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Run 'terraform fmt -recursive' before pushing."
          exit 1
